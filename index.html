<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VTS Video Den</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg-teal: #2E474F;
      --wall-brown: #472A29;
      --wall-height: 621px;
      --accent: #D6B88C;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg-teal);
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--wall-height);
      background: var(--wall-brown);
      z-index: 0;
      pointer-events: none;
    }

    /* LOADER */

    #page-loader {
      position: fixed;
      inset: 0;
      background: #2E474F;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20000;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #page-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .logo-loader {
      width: min(620px, 80vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #loader-logo {
      display: block;
      width: 100%;
      height: auto;
    }

    .loader-line {
      position: relative;
      width: 180px;
      height: 2px;
      background: rgba(214,184,140,0.15);
      overflow: hidden;
      border-radius: 2px;
    }

    .loader-line::before {
      content: "";
      position: absolute;
      top: 0;
      left: -40%;
      width: 40%;
      height: 100%;
      background: var(--accent);
      animation: lineSweep 1.2s linear infinite;
    }

    @keyframes lineSweep {
      from { transform: translateX(0); }
      to   { transform: translateX(350%); }
    }

    /* APP */

    .frame {
      position: relative;
      min-height: 100vh;
      width: auto;
      overflow: hidden;
      z-index: 1;
    }

    .scene-holder {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1;
    }

   .canvas-wrap {
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
}

/* DESKTOP / TABLET DEFAULTS */
:root {
  --scene-width: 1600px;
  --ext-height: calc(var(--scene-width) * 270 / 1877);
  --main-height: calc(var(--scene-width) * 1080 / 1877);
  --scene-total-height: calc(var(--ext-height) + var(--main-height));

  /* NEW: wall side strips stop at floor line */
  --wall-side-height: calc(var(--scene-width) * 1045 / 1877);
}

#wall-extension-canvas,
#rive-canvas {
  display: block;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: var(--scene-width);
  max-width: none;
}

#wall-extension-canvas {
  top: 0;
  height: var(--ext-height);
  z-index: 2;
  pointer-events: none;
}

#rive-canvas {
  top: var(--ext-height);
  height: var(--main-height);
  z-index: 1;
}

@media (min-width: 3004px) {
  :root {
    --scene-width: 3004px;
    --ext-height: calc(var(--scene-width) * 270 / 1877);
    --main-height: calc(var(--scene-width) * 1080 / 1877);
    --scene-total-height: calc(var(--ext-height) + var(--main-height));
    --wall-side-height: calc(var(--scene-width) * 1045 / 1877);
  }

  .frame {
    width: 3004px;
  }

  .scene-holder {
    height: var(--scene-total-height);
  }
}

@media (min-width: 810px) and (max-width: 3003.98px) {
  :root {
    --scene-width: 1600px;
    --ext-height: calc(var(--scene-width) * 270 / 1877);
    --main-height: calc(var(--scene-width) * 1080 / 1877);
    --scene-total-height: calc(var(--ext-height) + var(--main-height));
  }

  .frame {
    width: 1600px;
    max-width: 100vw;
  }

  .scene-holder {
    height: var(--scene-total-height);
  }
}

@media (max-width: 809.98px) {
  :root {
    --wall-height: 365px;

    --scene-width: 760px;
    --ext-height: calc(var(--scene-width) * 270 / 1877);
    --main-height: calc(var(--scene-width) * 1080 / 1877);
    --scene-total-height: calc(var(--ext-height) + var(--main-height));
    --wall-side-height: calc(var(--scene-width) * 1045 / 1877);
  }

  .frame {
    width: 100vw;
  }

  .scene-holder {
    height: var(--scene-total-height);
    left: 0;
    right: 0;
  }

  #wall-extension-canvas,
  #rive-canvas {
    width: var(--scene-width);
    max-width: none;
    left: 50%;
    transform: translateX(-50%);
  }
}

.wall-side {
  position: fixed;
  top: 0;
  height: var(--wall-side-height);
  width: max(0px, calc((100vw - var(--scene-width)) / 2));
  background-color: var(--wall-brown);
  background-image: url("wall_side_tile.svg");
  background-repeat: repeat-x;
  background-size: 36px var(--wall-side-height);
  z-index: 0;
  pointer-events: none;
}

.wall-side.left {
  left: 0;
  background-position: top right;
}

.wall-side.right {
  right: 0;
  background-position: top right;
}

    #lights-overlay {
      position: fixed;
      inset: 0;
      background: #4017D2;
      mix-blend-mode: soft-light;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 9999;
    }

    #lights-overlay.active {
      opacity: 1;
    }

    #volume-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      z-index: 10000;
      user-select: none;
      transition: transform 0.1s ease;
    }

    #volume-toggle:hover {
      transform: scale(1.1);
    }
  </style>

  <script src="https://unpkg.com/@rive-app/webgl2"></script>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
</head>

  <!-- APP -->
  <div class="frame">
    <div class="scene-holder">
      <div class="canvas-wrap">
        <canvas id="wall-extension-canvas" width="1877" height="270"></canvas>
        <canvas id="rive-canvas" width="1877" height="1080"></canvas>
      </div>
    </div>

  <div id="lights-overlay"></div>
  <div id="volume-toggle">🔊</div>

  <script>
    const canvas = document.getElementById("rive-canvas");
    const wallExtensionCanvas = document.getElementById("wall-extension-canvas");
    const volumeToggle = document.getElementById("volume-toggle");

    const SHEET_ID = "1XH9UmWCr_foe9-QFDNfpLVWKh9iSl2TStAZzncKG13E";
    const SHEET_NAME = "Sheet1";

    let r;
    let wallExtensionRive;
    let sheetRows = [];
    let lastRowIndex = -1;
    let staticSequenceLocked = false;
    let lightsOverlayInterval = null;
    let isMuted = false;

    function resizeRive() {
  if (r) {
    r.resizeDrawingSurfaceToCanvas();
  }

  if (wallExtensionRive) {
    wallExtensionRive.resizeDrawingSurfaceToCanvas();
  }
}

    function hideLoader() {
      document.getElementById("page-loader")?.classList.add("is-hidden");
    }

    function getPopupVMI() {
      return r.viewModelInstance.viewModel("propertyOfVMPopUp");
    }

    function getStaticSequenceTrigger() {
      return r.viewModelInstance
        .viewModel("propertyOfVMTV")
        .viewModel("propertyOfVMStatic")
        .trigger("staticSequence");
    }

    function getSwitchVMI() {
      return r.viewModelInstance.viewModel("propertyOfVMSwitch");
    }

    function syncLightsOverlay() {
      if (!r || !r.viewModelInstance) return;

      const switchVMI = getSwitchVMI();
      const isOn = switchVMI.boolean("onOff").value;

      document
        .getElementById("lights-overlay")
        .classList.toggle("active", isOn);
    }

    function setPopupText(headline, subhead) {
      const popupVMI = getPopupVMI();
      popupVMI.string("headlineProperty").value = headline;
      popupVMI.string("subheadProperty").value = subhead;
    }

    function querySheetRows() {
      return new Promise((resolve, reject) => {
        const queryUrl =
          `https://spreadsheets.google.com/tq?key=${SHEET_ID}` +
          `&sheet=${encodeURIComponent(SHEET_NAME)}` +
          `&headers=0` +
          `&tq=${encodeURIComponent("select A, B")}`;

        const query = new google.visualization.Query(queryUrl);

        query.send((response) => {
          if (response.isError()) {
            reject(
              new Error(
                `${response.getMessage()} ${response.getDetailedMessage() || ""}`.trim()
              )
            );
            return;
          }

          const data = response.getDataTable();
          const rows = [];

          for (let i = 0; i < data.getNumberOfRows(); i++) {
            const headline = (data.getValue(i, 0) || "").toString().trim();
            const subhead = (data.getValue(i, 1) || "").toString().trim();

            if (headline && subhead) {
              rows.push({ headline, subhead });
            }
          }

          resolve(rows);
        });
      });
    }

    function pickRandomRow(rows) {
      if (!rows.length) return null;

      if (rows.length === 1) {
        lastRowIndex = 0;
        return rows[0];
      }

      let index;
      do {
        index = Math.floor(Math.random() * rows.length);
      } while (index === lastRowIndex);

      lastRowIndex = index;
      return rows[index];
    }

    function applyRandomPopupText() {
      const pair = pickRandomRow(sheetRows);
      if (!pair) return;
      setPopupText(pair.headline, pair.subhead);
      resizeRive();
    }

    function loadGoogleChartsAndSheetData() {
      google.charts.load("current", { packages: ["table"] });

      google.charts.setOnLoadCallback(async () => {
        try {
          sheetRows = await querySheetRows();
          applyRandomPopupText();

          const staticSequenceTrigger = getStaticSequenceTrigger();

          staticSequenceTrigger.on(() => {
            if (staticSequenceLocked) return;

            staticSequenceLocked = true;
            applyRandomPopupText();

            setTimeout(() => {
              staticSequenceLocked = false;
            }, 9000);
          });
        } catch (err) {
          console.error("Sheet load failed:", err);
        }
      });
    }

    function startApp() {
  wallExtensionRive = new rive.Rive({
    src: "wall_extension.riv",
    canvas: wallExtensionCanvas,
    autoplay: true,
    onLoad: () => {
      resizeRive();
    }
  });

  r = new rive.Rive({
    src: "vts_video_vault_master.riv",
    canvas: canvas,
    autoplay: true,
    autoBind: true,
    artboard: "VTS VIDEO DEN 02",
    stateMachines: "State Machine 1",

    onLoad: () => {
      resizeRive();

      syncLightsOverlay();

      if (!lightsOverlayInterval) {
        lightsOverlayInterval = setInterval(syncLightsOverlay, 100);
      }

      hideLoader();

      setTimeout(() => {
        loadGoogleChartsAndSheetData();
      }, 3000);
    },

    onLoadError: (err) => {
      console.error("Rive load error:", err);
      hideLoader();
    }
  });

  window.addEventListener("resize", resizeRive);
}

    requestAnimationFrame(() => {
      requestAnimationFrame(startApp);
    });

    volumeToggle.addEventListener("click", () => {
      isMuted = !isMuted;
      volumeToggle.textContent = isMuted ? "🔇" : "🔊";
    });
  </script>

</body>
</html>
